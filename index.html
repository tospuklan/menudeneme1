<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urban Bites</title>
  <style>
    :root {
      --cream:         #F2EFE6;
      --teal:          #2A7F7F;
      --teal-dark:     #1d5f5f;
      --red:           #CC3300;
      --muted:         #8a8070;
      --border:        rgba(42,127,127,0.15);
      --border-strong: rgba(42,127,127,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--cream); color: #1a1a1a; }

    /* ── DİL SEÇİM EKRANI ── */
    #lang-screen {
      position: fixed; inset: 0; background: var(--cream); z-index: 999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px;
    }
    .lang-logo-img { width: 220px; height: auto; }
    .lang-subtitle { font-size: 12px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; text-align: center; }
    .lang-buttons { display: flex; flex-direction: column; gap: 12px; width: 240px; }
    .lang-btn {
      display: flex; align-items: center; justify-content: center;
      padding: 14px 0; border-radius: 10px; border: none;
      font-size: 15px; font-weight: 700; cursor: pointer;
      background: var(--teal); color: #fff;
      transition: background 0.2s;
    }
    .lang-btn:hover { background: var(--teal-dark); }

    /* ── MENU WRAPPER ── */
    .menu-wrapper { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; padding-bottom: 100px; display: none; }
    .menu-wrapper.visible { display: block; }

    /* ── APP HEADER ── */
    .app-header {
      background: var(--cream);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 56px;
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; z-index: 20;
    }
    .lang-toggle {
      display: flex; align-items: center; gap: 6px;
      border: 1.5px solid var(--border-strong); border-radius: 8px;
      padding: 6px 10px; cursor: pointer; background: none;
      font-size: 12px; font-weight: 700; color: var(--teal);
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .lang-toggle:hover { background: var(--teal); color: #fff; border-color: var(--teal); }

    /* ── HERO ── */
    .hero { width: 100%; height: 200px; overflow: hidden; margin-top: 56px; }
    .hero img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── TABS (sabit genişlik, scroll) ── */
    .tabs-bar {
      border-bottom: 2px solid var(--cream);
      background: #fff;
      position: sticky; top: 56px; z-index: 10;
      overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .tabs-bar::-webkit-scrollbar { display: none; }
    .tabs { display: flex; }
    .tab-btn {
      flex: 0 0 auto; width: 90px;
      padding: 13px 0; border: none; background: none;
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      color: var(--muted); cursor: pointer;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
      text-transform: uppercase; white-space: nowrap; text-align: center;
    }
    .tab-btn.active { color: var(--teal); border-bottom-color: var(--red); }

    /* ── PANELS ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── MENU LIST ── */
    .menu-list { padding: 0 16px; }
    .menu-item {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 16px 0; border-bottom: 1px solid var(--border);
    }
    .menu-item:last-child { border-bottom: none; }
    .item-img { width: 100px; height: 100px; min-width: 100px; border-radius: 8px; overflow: hidden; background: var(--cream); border: 1px solid var(--border); }
    .item-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .item-info { flex: 1; display: flex; flex-direction: column; gap: 5px; padding-top: 2px; }
    .item-name { font-size: 14px; font-weight: 700; color: #1a1a1a; line-height: 1.3; }
    .item-desc { font-size: 12px; color: var(--muted); line-height: 1.55; }
    .item-price { font-size: 14px; font-weight: 700; color: var(--teal); margin-top: 6px; letter-spacing: 0.03em; }

    /* ── WHATSAPP BUTTON ── */
    .wa-btn {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #25D366; color: #fff; border: none; border-radius: 50px;
      padding: 14px 28px; font-size: 15px; font-weight: 700; cursor: pointer;
      display: none; align-items: center; gap: 10px; text-decoration: none;
      box-shadow: 0 4px 20px rgba(37,211,102,0.4); white-space: nowrap; z-index: 100;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .wa-btn.visible { display: flex; }
    .wa-btn:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 6px 28px rgba(37,211,102,0.55); }
    .wa-btn:active { transform: translateX(-50%) scale(0.97); }
    .wa-icon { width: 22px; height: 22px; flex-shrink: 0; }

    /* ── RESPONSIVE ── */
    @media (min-width: 600px) {
      .menu-wrapper { margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
      .hero { height: 230px; }
      .item-img { width: 120px; height: 120px; min-width: 120px; }
      .item-name { font-size: 15px; } .item-desc { font-size: 13px; } .item-price { font-size: 15px; }
    }
    @media (min-width: 900px) {
      .menu-wrapper { max-width: 720px; }
      .app-header { max-width: 720px; }
      .hero { height: 270px; }
      .menu-list { display: grid; grid-template-columns: 1fr 1fr; gap: 0 32px; padding: 0 24px; }
      .menu-item { padding: 20px 0; }
      .menu-item:nth-last-child(-n+2) { border-bottom: none; }
    }
  </style>
</head>
<body>

<script>
  var currentLang = 'tr';
  var strings = {
    tr: { order: 'Sipariş Ver', flag: '🇬🇧', label: 'EN' },
    en: { order: 'Order Now',   flag: '🇹🇷', label: 'TR' }
  };

  function applyLang(lang) {
    currentLang = lang;
    var s = strings[lang];
    document.getElementById('wa-label').textContent   = s.order;
    document.getElementById('lang-flag').textContent  = s.flag;
    document.getElementById('lang-label').textContent = s.label;
    document.querySelectorAll('[data-tr]').forEach(function(el) {
      el.textContent = el.getAttribute('data-' + lang);
    });
    document.documentElement.lang = lang;
  }

  function setLang(lang) {
    document.getElementById('lang-screen').style.display = 'none';
    document.getElementById('menu').classList.add('visible');
    document.getElementById('wa-btn').classList.add('visible');
    applyLang(lang);
  }

  function toggleLang() {
    applyLang(currentLang === 'tr' ? 'en' : 'tr');
  }

  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById('panel-' + tab).classList.add('active');
    btn.classList.add('active');
    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
</script>
</body>
</html>
